services:
  postgres:
    image: postgres:16
    container_name: vessel-finance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vessel
      POSTGRES_PASSWORD: vessel
      POSTGRES_DB: vessel_finance
    ports:
      - "5433:5432"
    volumes:
      - vessel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vessel -d vessel_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vessel_pgdata:
