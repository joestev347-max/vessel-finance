# Self-Healing Workflow — Canonical Template
# Copy to .github/workflows/self-heal.yml in your application repo.
# See SELF-HEAL-SETUP.md for required secrets and configuration.

name: Self-Heal Bug
on:
  repository_dispatch:
    types: [self-heal-bug]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Callback — started
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}",
              "phase": "started",
              "run_id": "${{ github.run_id }}"
            }'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create branch
        run: |
          BRANCH="self-heal/bug-${{ github.event.client_payload.bug_id }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git config user.name "open-scaffold-bot"
          git config user.email "bot@openscaffold.com"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @anthropic-ai/claude-agent-sdk

      - name: Run self-heal agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUG_ID: ${{ github.event.client_payload.bug_id }}
          DIAGNOSIS: ${{ toJSON(github.event.client_payload.diagnosis) }}
          CLAUDE_MD: ${{ github.workspace }}/CLAUDE.md
        run: node scripts/self-heal-agent.js

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "fix: self-heal bug #${{ github.event.client_payload.bug_id }}

          Diagnosis: ${{ github.event.client_payload.diagnosis.root_cause }}

          Co-authored-by: open-scaffold-bot <bot@openscaffold.com>"
          git push origin "$BRANCH"

      - name: Open pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "fix: self-heal bug #${{ github.event.client_payload.bug_id }} — ${{ github.event.client_payload.diagnosis.page_route }}" \
            --body "## Self-Heal Report

          **User description:** ${{ github.event.client_payload.description }}

          **Root cause:** ${{ github.event.client_payload.diagnosis.root_cause }}

          **Severity:** ${{ github.event.client_payload.diagnosis.severity }} | **Confidence:** ${{ github.event.client_payload.diagnosis.confidence }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          *Generated by the Open Scaffold self-healing pipeline.*" \
            --label "self-heal,bug,ai-generated")

          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Callback — PR opened
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}",
              "phase": "pr-opened",
              "pr_url": "'"$PR_URL"'",
              "pr_number": '"$PR_NUMBER"',
              "branch": "'"$BRANCH"'"
            }'

      - name: Callback — no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}",
              "phase": "failed",
              "message": "Agent completed but produced no changes"
            }'

      - name: Callback — failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}",
              "phase": "failed",
              "message": "Workflow failed — check run logs",
              "run_id": "${{ github.run_id }}"
            }'
