name: tugos-ci

# CI for the TugOS sub-project (tugos/). Runs the same gates we run by hand:
# API typecheck + unit tests, and web typecheck + production build. No database
# or secrets required (unit tests use a fake client; the web build is static).
# The live browser e2e (tugos/web/e2e/uiverify.mjs) needs DB credentials and is
# run manually — not part of CI.

on:
  push:
    paths:
      - 'tugos/**'
      - '.github/workflows/tugos-ci.yml'
  pull_request:
    paths:
      - 'tugos/**'
      - '.github/workflows/tugos-ci.yml'

jobs:
  api:
    name: API (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tugos/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tugos/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tugos/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tugos/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
