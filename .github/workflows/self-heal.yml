# Self-Healing Workflow — vessel-finance
# Triggered by a repository_dispatch from the in-app "Dispatch self-heal" button.
# Runs the sandboxed repair agent and opens a PR. Auto-merge is OFF — every fix gets a human review.
# See SELF-HEAL-SETUP.md for the required secrets.

name: Self-Heal Bug
on:
  repository_dispatch:
    types: [self-heal-bug]

permissions:
  contents: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - name: Callback — started
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{"token":"${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}","bug_id":"${{ github.event.client_payload.bug_id }}","phase":"started","run_id":"${{ github.run_id }}"}' || true

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create branch
        run: |
          BRANCH="self-heal/bug-${{ github.event.client_payload.bug_id }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git config user.name "self-heal-bot"
          git config user.email "self-heal-bot@users.noreply.github.com"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Install deps + prepare Prisma/SQLite
        run: |
          npm ci
          npx prisma generate
          npx prisma db push --skip-generate

      - name: Run self-heal agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          BUG_ID: ${{ github.event.client_payload.bug_id }}
          DIAGNOSIS: ${{ toJSON(github.event.client_payload.diagnosis) }}
          CLAUDE_MD: ${{ github.workspace }}/CLAUDE.md
        run: node scripts/self-heal-agent.mjs

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "fix: self-heal bug ${{ github.event.client_payload.bug_id }}

          ${{ github.event.client_payload.diagnosis.root_cause }}

          Co-authored-by: self-heal-bot <self-heal-bot@users.noreply.github.com>"
          git push origin "$BRANCH"

      - name: Open pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "fix: self-heal bug ${{ github.event.client_payload.bug_id }}" \
            --body "## Self-Heal Report

          **User description:** ${{ github.event.client_payload.description }}

          **Root cause:** ${{ github.event.client_payload.diagnosis.root_cause }}

          **Severity:** ${{ github.event.client_payload.diagnosis.severity }} | **Confidence:** ${{ github.event.client_payload.diagnosis.confidence }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          *Generated by the self-healing pipeline. Review before merging — auto-merge is OFF.*")
          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Callback — PR opened
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{"token":"${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}","bug_id":"${{ github.event.client_payload.bug_id }}","phase":"pr-opened","pr_url":"'"$PR_URL"'","pr_number":'"$PR_NUMBER"',"branch":"'"$BRANCH"'"}' || true

      - name: Callback — no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{"token":"${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}","bug_id":"${{ github.event.client_payload.bug_id }}","phase":"failed","message":"Agent completed but produced no changes"}' || true

      - name: Callback — failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{"token":"${{ secrets.SELF_HEAL_CALLBACK_TOKEN }}","bug_id":"${{ github.event.client_payload.bug_id }}","phase":"failed","message":"Workflow failed — check run logs","run_id":"${{ github.run_id }}"}' || true
